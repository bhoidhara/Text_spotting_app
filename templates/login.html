{% extends "base.html" %}
{% set title = "VisionText | Login" %}

{% block content %}
<section class="auth">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="subtitle">Login to access your OCR dashboard and saved scans.</p>
    <form method="post" class="form">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required />
      <button class="button primary" type="submit">Login</button>
    </form>
    <div class="auth-divider">or</div>
    <a class="button ghost" href="{{ url_for('auth_google') }}">Continue with Google</a>
    <p class="helper">New here? <a href="{{ url_for('signup') }}">Create an account</a></p>
  </div>
</section>
{% endblock %}
