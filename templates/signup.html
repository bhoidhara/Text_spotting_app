{% extends "base.html" %}
{% set title = "VisionText | Signup" %}

{% block content %}
<section class="auth">
  <div class="auth-card">
    <h2>Create your account</h2>
    <p class="subtitle">Start extracting, editing, and saving text from images.</p>
    <form method="post" class="form">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="Choose a password" required />
      <button class="button primary" type="submit">Sign Up</button>
    </form>
    <div class="auth-divider">or</div>
    <a class="button ghost" href="{{ url_for('auth_google') }}">Continue with Google</a>
    <p class="helper">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</section>
{% endblock %}
