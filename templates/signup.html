{% extends "base.html" %}
{% set title = "VisionText | Signup" %}
{% set body_class = "auth-page theme-dark" %}

{% block content %}
<section class="auth">
  <div class="auth-card">
    <h2>VisionText</h2>
    <p class="subtitle">Sign in to your account or create a new one</p>
    <div class="auth-tabs">
      <a class="auth-tab" href="{{ url_for('login') }}">Login</a>
      <a class="auth-tab active" href="{{ url_for('signup') }}">Sign Up</a>
    </div>
    <form method="post" class="form auth-form">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="Choose a password" required />
      <button class="button primary" type="submit">Sign Up</button>
    </form>
  </div>
</section>
{% endblock %}
