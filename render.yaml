services:
  - type: web
    name: text-spotting-app
    env: python
    plan: free
    buildCommand: apt-get update && apt-get install -y tesseract-ocr libjpeg62-turbo-dev zlib1g-dev libfreetype6-dev libpng-dev libtiff5-dev libwebp-dev build-essential && python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: SUPABASE_USE_DB
        value: "true"
      - key: SUPABASE_USE_STORAGE
        value: "true"
      - key: STORE_LOCAL_UPLOADS
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: LIBRETRANSLATE_URL
        value: "https://libretranslate.de"
      - key: LIBRETRANSLATE_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TESSERACT_CMD
        sync: false
