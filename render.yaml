services:
  - type: web
    name: text-spotting-app
    env: python
    plan: free
    buildCommand: apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-hin tesseract-ocr-guj libjpeg62-turbo-dev zlib1g-dev libfreetype6-dev libpng-dev libtiff5-dev libwebp-dev libheif-dev libde265-0 poppler-utils build-essential && python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: SUPABASE_USE_DB
        value: "true"
      - key: SUPABASE_USE_STORAGE
        value: "true"
      - key: STORE_LOCAL_UPLOADS
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: LIBRETRANSLATE_URL
        value: "https://libretranslate.de"
      - key: LIBRETRANSLATE_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TESSERACT_CMD
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_CMD_ARGS
        value: "--worker-class gthread --threads 4 --timeout 90"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_ENV
        value: "production"
